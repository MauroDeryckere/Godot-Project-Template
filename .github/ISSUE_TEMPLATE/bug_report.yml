name: Bug Report
description: Report a bug with the template
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (crash, data loss, cannot progress)
        - Major (gameplay-breaking, bad visual glitch, input not working)
        - Minor (visual polish, typo, slight imbalance, edge case)
    validations:
      required: true

  - type: input
    id: godot-version
    attributes:
      label: Godot version
      placeholder: "4.6"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - Linux
        - macOS
        - Android
        - iOS
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste crash logs or attach screenshots.
      render: text
