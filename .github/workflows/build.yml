name: Build Binaries

# Builds the extension for all platforms and collects binaries as a downloadable artifact.
# Pushing a version tag (e.g. v1.0.0) will also create a GitHub Release with the binaries.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop:
    name: ${{ matrix.os }} (${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [debug, release]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache godot-cpp build
        uses: actions/cache@v5
        with:
          path: build/${{ matrix.build_type }}
          key: godot-cpp-${{ matrix.os }}-${{ matrix.build_type }}-${{ hashFiles('third_party/godot-cpp/**') }}

      - name: Configure
        run: cmake --preset ${{ matrix.build_type }} -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset ${{ matrix.build_type }} --parallel

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.os }}-${{ matrix.build_type }}
          path: godot/bin/
          if-no-files-found: error

  android:
    name: Android ${{ matrix.abi }} (${{ matrix.build_type }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64, arm32, x86_64]
        build_type: [android-arm64, android-arm32, android-x86_64]
        include:
          - abi: arm64
            preset_release: android-arm64
            preset_debug: android-arm64-debug
          - abi: arm32
            preset_release: android-arm32
            preset_debug: android-arm32-debug
          - abi: x86_64
            preset_release: android-x86_64
            preset_debug: android-x86_64-debug
        exclude:
          - build_type: android-arm64
          - build_type: android-arm32
          - build_type: android-x86_64

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache godot-cpp (release)
        uses: actions/cache@v5
        with:
          path: build/${{ matrix.preset_release }}
          key: godot-cpp-${{ matrix.preset_release }}-${{ hashFiles('third_party/godot-cpp/**') }}

      - name: Cache godot-cpp (debug)
        uses: actions/cache@v5
        with:
          path: build/${{ matrix.preset_debug }}
          key: godot-cpp-${{ matrix.preset_debug }}-${{ hashFiles('third_party/godot-cpp/**') }}

      - name: Build release
        run: |
          cmake --preset ${{ matrix.preset_release }} -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          cmake --build --preset ${{ matrix.preset_release }} --parallel

      - name: Build debug
        run: |
          cmake --preset ${{ matrix.preset_debug }} -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          cmake --build --preset ${{ matrix.preset_debug }} --parallel

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: bin-android-${{ matrix.abi }}
          path: godot/bin/
          if-no-files-found: error

  ios:
    name: iOS (arm64)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache godot-cpp (release)
        uses: actions/cache@v5
        with:
          path: build/ios
          key: godot-cpp-ios-release-${{ hashFiles('third_party/godot-cpp/**') }}

      - name: Cache godot-cpp (debug)
        uses: actions/cache@v5
        with:
          path: build/ios-debug
          key: godot-cpp-ios-debug-${{ hashFiles('third_party/godot-cpp/**') }}

      - name: Build release
        run: |
          cmake --preset ios -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          cmake --build --preset ios --parallel

      - name: Build debug
        run: |
          cmake --preset ios-debug -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          cmake --build --preset ios-debug --parallel

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: bin-ios
          path: godot/bin/
          if-no-files-found: error

  collect:
    name: Collect Binaries
    runs-on: ubuntu-latest
    needs: [desktop, android, ios]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: bin
          pattern: bin-*
          merge-multiple: true

      - name: Upload combined artifact
        uses: actions/upload-artifact@v7
        with:
          name: extension-binaries
          path: bin/

      - name: Zip binaries
        if: startsWith(github.ref, 'refs/tags/v')
        run: zip -r "${{ github.event.repository.name }}-${{ github.ref_name }}.zip" bin/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh release create "$GITHUB_REF_NAME" "${{ github.event.repository.name }}-${{ github.ref_name }}.zip" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
