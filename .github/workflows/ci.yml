name: CI

# Runs on PRs and pushes to main when source/build files change.
# GitHub natively supports [skip ci] in commit messages to skip a run.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "cpp/**"
      - "tests/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "third_party/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "cpp/**"
      - "tests/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "third_party/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop:
    name: ${{ matrix.os }} (${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]
        include:
          - os: ubuntu-latest
            build_type: Debug

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache godot-cpp build
        uses: actions/cache@v5
        with:
          path: build/${{ matrix.build_type == 'Debug' && 'debug' || 'release' }}
          key: godot-cpp-${{ matrix.os }}-${{ matrix.build_type }}-${{ hashFiles('third_party/godot-cpp/**', 'CMakeLists.txt', 'cpp/CMakeLists.txt') }}

      - name: Configure
        run: cmake --preset ${{ matrix.build_type == 'Debug' && 'debug' || 'release' }} -DBUILD_TESTS=ON -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset ${{ matrix.build_type == 'Debug' && 'debug' || 'release' }} --parallel

      - name: Test
        run: ctest --test-dir build/${{ matrix.build_type == 'Debug' && 'debug' || 'release' }} --output-on-failure

      - name: Set up Godot
        if: matrix.build_type == 'Debug'
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.0
          use-dotnet: false

      - name: Validate extension loads
        if: matrix.build_type == 'Debug'
        shell: bash
        run: |
          OUTPUT=$(godot --headless --path godot/project --quit --verbose 2>&1 || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "GDExtension entry point.*not found"; then
            echo "::error::Extension failed to load"
            exit 1
          fi

  android:
    name: Android (${{ matrix.abi }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64, arm32, x86_64]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache godot-cpp build
        uses: actions/cache@v5
        with:
          path: build/android-${{ matrix.abi }}
          key: godot-cpp-android-${{ matrix.abi }}-${{ hashFiles('third_party/godot-cpp/**', 'CMakeLists.txt', 'cpp/CMakeLists.txt') }}

      - name: Configure
        run: cmake --preset android-${{ matrix.abi }} -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset android-${{ matrix.abi }} --parallel

  ios:
    name: iOS (arm64)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache godot-cpp build
        uses: actions/cache@v5
        with:
          path: build/ios
          key: godot-cpp-ios-${{ hashFiles('third_party/godot-cpp/**', 'CMakeLists.txt', 'cpp/CMakeLists.txt') }}

      - name: Configure
        run: cmake --preset ios -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset ios --parallel
