name: CI

# Runs on PRs and pushes to main when source/build files change.
# GitHub natively supports [skip ci] in commit messages to skip a run.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop:
    name: ${{ matrix.os }} (${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]
        include:
          - os: ubuntu-latest
            build_type: Debug

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Cache godot-cpp build
        uses: actions/cache@v5
        with:
          path: build/${{ matrix.build_type == 'Debug' && 'debug' || 'release' }}
          key: godot-cpp-${{ matrix.os }}-${{ matrix.build_type }}-${{ hashFiles('third_party/godot-cpp/**') }}

      - name: Configure
        run: cmake --preset ${{ matrix.build_type == 'Debug' && 'debug' || 'release' }} -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build --preset ${{ matrix.build_type == 'Debug' && 'debug' || 'release' }}

      - name: Test
        run: ctest --test-dir build/${{ matrix.build_type == 'Debug' && 'debug' || 'release' }} --output-on-failure

  android:
    name: Android (${{ matrix.abi }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64, arm32, x86_64]

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Cache godot-cpp build
        uses: actions/cache@v5
        with:
          path: build/android-${{ matrix.abi }}
          key: godot-cpp-android-${{ matrix.abi }}-${{ hashFiles('third_party/godot-cpp/**') }}

      - name: Configure
        run: cmake --preset android-${{ matrix.abi }}

      - name: Build
        run: cmake --build --preset android-${{ matrix.abi }}

  ios:
    name: iOS (arm64)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Cache godot-cpp build
        uses: actions/cache@v5
        with:
          path: build/ios
          key: godot-cpp-ios-${{ hashFiles('third_party/godot-cpp/**') }}

      - name: Configure
        run: cmake --preset ios

      - name: Build
        run: cmake --build --preset ios
